<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AFA</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="shell" class="shell compact">
      <header class="topbar drag-region">
        <div class="title-wrap">
          <span class="status-dot" id="statusDot"></span>
          <div>
            <p class="title">AFA</p>
            <p class="subtitle" id="statusLine">Checking virtual mic…</p>
          </div>
        </div>

        <div class="window-actions no-drag">
          <button id="toggleSettingsBtn" class="icon-btn" aria-label="Settings">•••</button>
          <button id="closeBtn" class="icon-btn close-btn" aria-label="Close">×</button>
        </div>
      </header>

      <section class="composer">
        <textarea id="textInput" rows="4" placeholder="Type here, then press Speak or Cmd/Ctrl+Enter."></textarea>

        <div class="action-row">
          <button id="speakBtn" class="primary-btn">Speak</button>
          <button id="clearBtn" class="secondary-btn">Clear</button>
          <button id="retryDriverBtn" class="secondary-btn">Retry</button>
        </div>
      </section>

      <section id="settingsPanel" class="settings hidden">
        <div class="mini-card">
          <p id="driverHeadline" class="mini-title">Checking audio driver…</p>
          <p id="driverDetail" class="mini-text">AFA is preparing the virtual microphone path.</p>

          <div class="driver-actions">
            <button id="installDriverBtn" class="secondary-btn">Install Driver</button>
            <button id="setupBtn" class="secondary-btn">Setup</button>
            <button id="doctorBtn" class="secondary-btn">Doctor</button>
          </div>
        </div>

        <div class="settings-grid">
          <label>
            <span>Voice</span>
            <select id="voiceSelect">
              <option value="">System default</option>
            </select>
          </label>

          <label>
            <span>Rate</span>
            <input id="rateInput" type="number" min="50" max="600" step="10" />
          </label>

          <label>
            <span>Mode</span>
            <select id="modeSelect">
              <option value="device">Device</option>
              <option value="system">System</option>
            </select>
          </label>

          <label>
            <span>Output</span>
            <input id="outputInput" type="text" placeholder="BlackHole 2ch" />
          </label>
        </div>

        <div class="action-row">
          <button id="saveRouteBtn" class="secondary-btn">Apply</button>
          <button id="refreshBtn" class="secondary-btn">Refresh</button>
        </div>

        <pre id="messageBox" class="message-box"></pre>
      </section>
    </main>

    <script src="./renderer.js"></script>
  </body>
</html>
